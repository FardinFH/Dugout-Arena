<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Dugout Arena</title>
    <link rel="stylesheet" href="forgot-password.css">
</head>
<body>

<section class="forgot-page">
    <div class="overlay"></div>

    <div class="forgot-box">
        <div class="logo-area">
            <img src="logo.png" alt="Logo">
            <h2>Dugout Arena</h2>
        </div>

        <h1>Reset Password</h1>
        <p class="subtitle">Enter your email or phone number to find your account</p>

        <form id="findAccountForm">
            <div class="input-group">
                <label>Email or Phone Number</label>
                <input type="text" id="identifier" placeholder="Enter email or phone number" required>
            </div>

            <p id="errorMsg" class="error-msg"></p>

            <button type="submit" class="reset-btn">Find Account</button>
        </form>

        <form id="resetPasswordForm" class="hidden">
            <div class="input-group">
                <label>New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" placeholder="Enter new password" required>
                    <span class="toggle-password" onclick="togglePassword('newPassword', 'toggleNew')" id="toggleNew">Show</span>
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    <span class="toggle-password" onclick="togglePassword('confirmPassword', 'toggleConfirm')" id="toggleConfirm">Show</span>
                </div>
            </div>

            <p id="successMsg" class="success-msg"></p>
            <p id="passwordErrorMsg" class="error-msg"></p>

            <button type="submit" class="reset-btn">Update Password</button>
        </form>

        <p class="login-text">
            Remember your password?
            <a href="login.html">Login</a>
        </p>
    </div>
</section>

<script>
const findAccountForm = document.getElementById("findAccountForm");
const resetPasswordForm = document.getElementById("resetPasswordForm");

const errorMsg = document.getElementById("errorMsg");
const successMsg = document.getElementById("successMsg");
const passwordErrorMsg = document.getElementById("passwordErrorMsg");

let matchedUser = null;

findAccountForm.addEventListener("submit", function(e) {
    e.preventDefault();

    const identifier = document.getElementById("identifier").value.trim();
    const savedUser = JSON.parse(localStorage.getItem("registeredUser"));

    errorMsg.innerText = "";

    if (!savedUser) {
        errorMsg.innerText = "No registered account found.";
        return;
    }

    if (identifier === savedUser.email || identifier === savedUser.phone) {
        matchedUser = savedUser;

        findAccountForm.classList.add("hidden");
        resetPasswordForm.classList.remove("hidden");
    } else {
        errorMsg.innerText = "Account not found. Please check your email or phone number.";
    }
});

resetPasswordForm.addEventListener("submit", function(e) {
    e.preventDefault();

    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    successMsg.innerText = "";
    passwordErrorMsg.innerText = "";

    if (newPassword !== confirmPassword) {
        passwordErrorMsg.innerText = "Passwords do not match.";
        return;
    }

    matchedUser.password = newPassword;

    localStorage.setItem("registeredUser", JSON.stringify(matchedUser));

    successMsg.innerText = "Password updated successfully! Redirecting to login...";

    setTimeout(function() {
        window.location.href = "login.html";
    }, 1200);
});

function togglePassword(inputId, toggleId) {
    const input = document.getElementById(inputId);
    const toggle = document.getElementById(toggleId);

    if (input.type === "password") {
        input.type = "text";
        toggle.innerText = "Hide";
    } else {
        input.type = "password";
        toggle.innerText = "Show";
    }
}
</script>

</body>
</html>
