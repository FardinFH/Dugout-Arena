<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boxing Tournaments | Dugout Arena</title>
<link rel="stylesheet" href="sports.css">
</head>

<body>

<header class="navbar">
<div class="brand">
<img src="logo.png">
<span>Dugout Arena</span>
</div>

<nav>
<a href="index.html">Home</a>
<a href="tournaments.html">Tournaments</a>
<a href="live-scores.html" class="active">Live Scores</a>
<a href="teams.html">Teams</a>
<a href="login.html">Login</a>
</nav>
</header>

<main>

<section class="sports-hero">
<div class="hero-glow"></div>

<div class="sports-content">
<span class="tagline">Boxing Arena</span>
<h1>Boxing Events</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search tournament name...">
</div>
</div>
</section>

<section class="tournament-section">
<div class="section-heading">
<span>Available Events</span>
<h2>Choose Event</h2>
</div>

<div class="tournament-grid" id="tournamentGrid">

<a href="boxing-tournament-details.html?tournament=wba" class="tournament-card" data-name="wba boxing">
<span class="badge famous">Famous</span>
<div class="icon">🥊</div>
<h3>WBA Championship</h3>
<p>World</p>
</a>

<a href="boxing-tournament-details.html?tournament=wbc" class="tournament-card" data-name="wbc boxing">
<span class="badge famous">Famous</span>
<div class="icon">🔥</div>
<h3>WBC Championship</h3>
<p>World</p>
</a>

<a href="boxing-tournament-details.html?tournament=olympic-boxing" class="tournament-card" data-name="olympic boxing">
<span class="badge live">Live</span>
<div class="icon">🥇</div>
<h3>Olympic Boxing</h3>
<p>Olympics</p>
</a>

</div>

<p class="no-result" id="noResult">No tournaments found</p>
</section>

</main>

<footer>
<p>© 2026 Dugout Arena. All rights reserved.</p>
</footer>

<script>
const searchInput=document.getElementById("searchInput");
const cards=document.querySelectorAll(".tournament-card");
const noResult=document.getElementById("noResult");

searchInput.addEventListener("keyup",function(){
const value=searchInput.value.toLowerCase().trim();
let visible=0;

cards.forEach(function(card){
const name=card.getAttribute("data-name");

if(name.includes(value)){
card.style.display="flex";
visible++;
}else{
card.style.display="none";
}
});

noResult.style.display=visible===0?"block":"none";
});
</script>

</body>
</html>
