<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Dugout Arena</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>

<section class="register-page">
    <div class="overlay"></div>

    <div class="register-box">
        <div class="logo-area">
            <img src="logo.png" alt="Logo">
            <h2>Dugout Arena</h2>
        </div>

        <h1>Create Account</h1>
        <p class="subtitle">Join the arena and build your sports journey</p>

        <form id="registerForm">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Role</label>
                <select id="role" required>
                    <option value="">Select your role</option>
                    <option value="Organizer">Organizer</option>
                    <option value="Player">Player</option>
                </select>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Create password" required>
                    <span class="toggle-password" onclick="togglePassword('password', 'togglePass')" id="togglePass">Show</span>
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                    <span class="toggle-password" onclick="togglePassword('confirmPassword', 'toggleConfirm')" id="toggleConfirm">Show</span>
                </div>
            </div>

            <button type="submit" class="register-btn">Create Account</button>
        </form>

        <p class="login-text">
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </div>
</section>

<script>
const registerForm = document.getElementById("registerForm");

registerForm.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;
    const role = document.getElementById("role").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    const userData = {
        name: name,
        phone: phone,
        email: email,
        role: role,
        password: password
    };

    localStorage.setItem("registeredUser", JSON.stringify(userData));
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("userEmail", email);

    window.location.href = "tournaments.html";
});

function togglePassword(inputId, toggleId) {
    const input = document.getElementById(inputId);
    const toggle = document.getElementById(toggleId);

    if (input.type === "password") {
        input.type = "text";
        toggle.innerText = "Hide";
    } else {
        input.type = "password";
        toggle.innerText = "Show";
    }
}
</script>

</body>
</html>
